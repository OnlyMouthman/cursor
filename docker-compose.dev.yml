services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: web-frontend-dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    env_file:
      - ./frontend/.env.development
    # 與匿名卷 /app/node_modules 搭配：每次啟動依 package.json 補齊依賴，避免主機新增套件後容器仍缺模組（如 dompurify、marked）
    command: sh -c "npm install && npm run dev"
    networks:
      - web-network

  nginx:
    image: nginx:alpine
    container_name: web-nginx-dev
    ports:
      - "8080:80"
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
    networks:
      - web-network

networks:
  web-network:
    driver: bridge


